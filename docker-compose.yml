version: '3.1'

services:
  db:
    image: mysql
    container_name: mysql
    restart: always
    privileged: true  # 开启mysql容器特权模式，解决无权限操作文件的问题
    environment:
      - MYSQL_ROOT_PASSWORD=root  # mysql root用户密码
    #ports: # mysql容器不开放端口，容器间通信通过别名方式
      #- "3306:3306"
    volumes:
      - ./mysql/data:/var/lib/mysql # mysql数据存储目录
      - ./mysql/conf/my.cnf:/etc/mysql/my.cnf # mysql配置文件
      - ./mysql/initdb:/docker-entrypoint-initdb.d  # mysql初始化sql目录

  redis:
    image: redis
    container_name: redis
    restart: always
    privileged: true  # 开启redis容器特权模式，解决无权限操作文件的问题
    #ports: # redis容器不开放端口，容器间通信通过别名方式
      #- "6379:6379"
    volumes:
      - ./redis/conf/redis.conf:/redis/redis.conf # redis配置文件
      - ./redis/data:/redis/data  # redis数据存储目录
      - ./redis/log/redis.log:/redis/log/redis.log  # redis日志存储目录
    command: redis-server /redis/redis.conf # 指定配置文件启动redis

  nginx:
      container_name: nginx
      image: nginx
      restart: always
      privileged: true
      ports:
        - "80:80"
      volumes:
        - ./nginx/conf/nginx.conf:/etc/nginx/nginx.conf
        - ./nginx/html:/etc/nginx/html
        - ./nginx/log:/var/log/nginx

  iptv:
      build:                          
        context: ./iptv # 构建镜像的文件路径, . 当前目录
        dockerfile: Dockerfile  # 构建镜像的文件名称
      container_name: iptv
      restart: always
      privileged: true
      environment:
        - 'TZ="Asia/Shanghai"'  # 设置为中国时区
      ports:
        - "8080:8080"
      volumes:
        - ./iptv/logs:/iptv/logs
      depends_on:
        - db
        - redis

